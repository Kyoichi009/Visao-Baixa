<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Baixa Visão</title>
    <style>
        /* Configurações Globais e Estética Y2K */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #FDF9F3; 
            --text-color: #111111;
            --accent-pink: #FFD3E8; 
            --dark-gray: #222222;
            --card-bg: #FFFFFF;
            --border-radius-lg: 24px;
            --border-radius-sm: 14px;
            font-size: 18px; /* Base estável para o seletor de tamanho */
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Barra de Acessibilidade Fixa */
        .accessibility-bar {
            background-color: var(--dark-gray);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .accessibility-bar span {
            color: #FFFFFF;
            font-weight: bold;
        }

        .acc-btn {
            background-color: var(--accent-pink);
            color: #000000;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-left: 8px;
            font-size: 1rem;
        }

        /* Cabeçalho */
        header {
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dark-gray);
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            color: var(--text-color);
        }

        .logo span {
            background-color: var(--accent-pink);
            padding: 2px 8px;
            border-radius: 6px;
            color: #000000;
        }

            padding: 40px 20px;
            background-color: var(--card-bg);
